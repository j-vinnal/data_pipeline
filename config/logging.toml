# logging.toml

version = 1
disable_existing_loggers = false

[formatters.conditional_formatter]
# The "()" key tells dictConfig to instantiate a custom class.
"()" = "data_pipeline.core.logger.ConditionalFormatter"
fmt = "{asctime}.{msecs:03.0f} | {levelname:<8} | {name:<14} | {funcName:<12}:{lineno} | {message:<20}"
style = "{"
datefmt = "%Y-%m-%d %H:%M:%S"
extra_fields = ["file", "rows", "source", "url", "format", "saved_to", "size_mb", "path"]

[handlers.console_handler]
class = "logging.StreamHandler"
level = "DEBUG"
formatter = "conditional_formatter"
stream = "ext://sys.stdout"

[handlers.timed_file_handler]
class = "logging.handlers.TimedRotatingFileHandler"
level = "DEBUG"
formatter = "conditional_formatter"
filename = "logs/pipeline.log"
when = "midnight"
interval = 1
backupCount = 30
utc = true
encoding = "utf-8"

[root]
level = "DEBUG"
handlers = ["console_handler", "timed_file_handler"]

[loggers.urllib3]
level = "WARNING"

[loggers.requests]
level = "WARNING"